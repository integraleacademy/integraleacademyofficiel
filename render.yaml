services:
  - type: web
    name: integrale-academy
    env: node
    plan: starter
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: OPENAI_MODEL
        value: gpt-5.4-mini
      - key: OPENAI_TEMPERATURE
        value: "0.4"
      - key: OPENAI_MAX_TOKENS
        value: "900"

